{# Load the tag library #}
{% load bootstrap5 %}
{# Load CSS and JavaScript #}
{% bootstrap_css %}
{% bootstrap_javascript %}
{% load static %}

{# Display django.contrib.messages as Bootstrap alerts #}
{% bootstrap_messages %}

<div align="center" id="contact-form" class="row justify-content-center">
    <div class="col-md-5">
      <h1>Contact</h1>
      <form method="post" action="/send_message/">
          {% csrf_token %}
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Your Name" required>
          </div>
          <div class="form-group">
              <label for="email">Email Address</label>
              <input type="text" class="form-control" id="email" name="email" placeholder="name@example.com" required>
          </div>
          <div class="form-group">
            <label for="phone_number">Phone Number</label>
            <input type="text" class="form-control" id="phone_number" name="phone_number" placeholder="1-555-555-5555" required>
        </div>
          <div class="form-group">
              <label for="message">Type your message here</label>
              <textarea class="form-control" id="message" name="message" rows="3" required></textarea>
          </div>
          <button id="submit-button" type="submit" class="btn btn-primary">Submit</button>
      </form>
    </div>
</div>
