name: Build Check

on:
  - pull_request

jobs:
  check-pins:
    uses: tnoff/github-workflows/.github/workflows/check-action-pins.yml@5a3473dcbf9095c0e2137fa209bf1d10bc9f791f
  spellback:
    name: Spellcheck
    runs-on: ubuntu-24.04
    steps:
    # The checkout step
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
    - uses: rojopolis/spellcheck-github-actions@e3cd8e9aec4587ec73bc0e60745aafd45c37aa2e
      name: Spellcheck
      with:
        config_path: .spellcheck/spellcheck.yml
  test:
    name: Python Test
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: '3.14'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      env:
        FLASK_SECRET_KEY: test-secret-key
        FORCE_DEBUG: false
        CONTACT_EMAIL: test@example.com
        CONTACT_NUMBER: 555-555-5555
        EMAIL_HOST_USER: test@example.com
      run: |
        python test_app.py
  docker:
    name: Docker
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@172dff065fb2e54aaed577fd667975cd412819fb
    - name: Build image
      uses: docker/build-push-action@c5117b60bc829f00aaacb038e99de2712bee6e6e
      with:
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max
