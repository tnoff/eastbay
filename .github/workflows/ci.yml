name: Build Check

on:
  - pull_request

jobs:
  spellback:
    name: Spellcheck
    runs-on: ubuntu-24.04
    steps:
    # The checkout step
    - uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2
    - uses: rojopolis/spellcheck-github-actions@e3cd8e9aec4587ec73bc0e60745aafd45c37aa2e
      name: Spellcheck
      with:
        config_path: .spellcheck/spellcheck.yml
  test:
    name: Python Test
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: '3.14'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      env:
        FLASK_SECRET_KEY: test-secret-key
        FORCE_DEBUG: false
        CONTACT_EMAIL: test@example.com
        CONTACT_NUMBER: 555-555-5555
        EMAIL_HOST_USER: test@example.com
      run: |
        python test_app.py
  docker:
    name: Docker
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@172dff065fb2e54aaed577fd667975cd412819fb
    - name: Build image
      uses: docker/build-push-action@b66d8774c665b789105b440514f0c97e6f19b06f
      with:
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max
