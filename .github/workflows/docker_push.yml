name: Tag and build docker image

on:
  pull_request:
    types:
    - closed

jobs:
  check_merge_and_tag:
    name: Check merge and tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      status: ${{ steps.check.conclusion }}
    steps:
      - name: Get PR labels
        id: pr-labels
        uses: joerick/pr-labels-action@e61c643fe47e53d3495405cc9f441b5da06ab1e9
      - name: Check merge and labels
        id: check
        if: ${{ github.event.pull_request.merged == true && (contains(steps.pr-labels.outputs.labels, 'build-docker')) }}
        run: exit 0
  push_to_registry:
    name: Push Docker Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs:
      - check_merge_and_tag
    if: needs.check_merge_and_tag.outputs.status == 'success'
    steps:
      - name: Get PR labels
        id: pr-labels
        uses: joerick/pr-labels-action@e61c643fe47e53d3495405cc9f441b5da06ab1e9
      - name: Check labels
        if: ${{ !(contains(steps.pr-labels.outputs.labels, 'build-docker')) }}
        run: exit 0
      - name: Check out the repo
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2
        if: contains(steps.pr-labels.outputs.labels, 'build-docker')
      - name: Install doctl
        uses: digitalocean/action-doctl@0e7c88a2988e3a39f018289c5a1b90d460a62ffc
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Log in to DigitalOcean Container Registry with short-lived credentials
        run: doctl registry login --expiry-seconds 1200
      - name: Get github hash
        id: github-hash
        run: echo "github_hash=$(echo $GITHUB_SHA | head -c7)" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@84ad562665bb303b549fec655d1b64f9945f3f91
        with:
          push: true
          context: .
          tags: registry.digitalocean.com/${{ secrets.REGISTRY_NAME }}/eastbay:latest,registry.digitalocean.com/${{ secrets.REGISTRY_NAME }}/eastbay:${{ steps.github-hash.outputs.github_hash }}
  push_to_oci:
    name: Push Docker Image to OCI
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs:
      - check_merge_and_tag
    if: needs.check_merge_and_tag.outputs.status == 'success'
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Get github hash
        id: github-hash
        run: echo "github_hash=$(echo $GITHUB_SHA | head -c7)" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGISTRY }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          context: .
          tags: ${{ secrets.OCI_REGISTRY }}/${{ secrets.OCI_REPO_NAME }}:latest,${{ secrets.OCI_REGISTRY }}/${{ secrets.OCI_REPO_NAME }}:${{ steps.github-hash.outputs.github_hash }}
