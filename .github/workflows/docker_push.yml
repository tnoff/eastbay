name: Tag and build docker image

on:
  push:
    branches:
    - main

jobs:
  check_labels:
    name: "Check labels"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      result: ${{ steps.check-label.outputs.result }}
    steps:
    - uses: paul1k/check-pr-labels@d5a5270fd31704a9c7da37846f1b8fb77d11b747
      id: check-label
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        pull-number: ${{ github.event.number }}
        labels: '["skip-docker-build"]'
  push_to_registry:
    name: Push Docker Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs:
      - check_labels
    if: needs.check_labels.outputs.result == 'true'
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Log in to DigitalOcean Container Registry with short-lived credentials
        run: doctl registry login --expiry-seconds 1200
      - name: Get github hash
        id: github-hash
        run: echo "github_hash=$(echo $GITHUB_SHA | head -c7)" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          tags: registry.digitalocean.com/${{ secrets.REGISTRY_NAME }}/eastbay:latest,registry.digitalocean.com/${{ secrets.REGISTRY_NAME }}/eastbay:${{ steps.github-hash.outputs.github_hash }}
